<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <nav class="sidebar">
        <div class="logo">
          <i class="fa-brands fa-spotify"></i>
        </div>
        <div class="livro">
          <i class="fa-solid fa-book"></i>
          <p>Sua Biblioteca</p>
        </div>
        <div class="playlist">
          <h5>Crie sua primeira PlayList</h5>
          <p>É facil, vamos te ajudar</p>
          <button>Criar PlayList</button>
        </div>
        <div class="podcast">
          <h5>Que tal seguir um Podcast?</h5>
          <p>Avisaremos você sobre nossos episodios</p>
          <button>Explore Podcast</button>
        </div>
        <div class="nav-footer">
            <a href="#">Legal</a>
            <a href="#">Centro de Privacidade</a>
            <a href="#">Politica de Privacidade</a>
            <a href="#">Cookies</a>
            <a href="#">Sobre anuncios</a>
            <a href="#">Acessibilidade</a>
          </a>
        </div>
        <button class="nav-button">
          <i class="fa-solid fa-globe"></i>
          Portugues do Brasil
        </button>
      </nav>
      <main>
        <header>
          <i class="fas fa-search"></i>
          <input placeholder="Oque voce quer ouvir" />
        </header>
        <section class="content">
          <h2>Artistas populares</h2>
          <div class="artists-grid"></div>
          <h2>Albuns populares</h2>
          <div class="albums-grid"></div>
        </section>
      </main>
    </div>
  </body>
  <script src="script.js"></script>
</html>
