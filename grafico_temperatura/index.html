<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Temperatura Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
  padding: 20px;
}
.container {
  background: #1f2a40;
  padding: 20px;
  border-radius: 20px;
  max-width: 600px;
  margin: auto;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}
h2 { margin-bottom: 15px; }
input {
  padding: 10px;
  width: 60%;
  border-radius: 10px;
  border: none;
}
button {
  padding: 10px 15px;
  border: none;
  background: #00c6ff;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-left: 5px;
}
button:hover {
  background: #0072ff;
}
.status {
  margin-top: 10px;
  font-weight: bold;
}
canvas {
  margin-top: 20px;
}
</style>
</head>
<body>

<div class="container">
  <h2>🌡️ Monitor de Temperatura</h2>

  <input type="number" id="temp" placeholder="Digite a temperatura">
  <button onclick="enviar()">Enviar</button>

  <div style="margin-top: 15px;">
    <button id="btnIniciar" onclick="iniciarAutomacao()" style="background: #28a745;">▶️ Iniciar Auto</button>
    <button id="btnParar" onclick="pararAutomacao()" style="background: #dc3545;" disabled>⏹️ Parar Auto</button>
  </div>

  <div class="status" id="status"></div>
  <canvas id="grafico"></canvas>
</div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
